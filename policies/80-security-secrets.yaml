id: pack-security-secrets
description: Strict ABAC rules for Secret protection and leak prevention (FEAT--SECURITY-SECRET-PACK).
rules:
  - id: block-secrets-from-cloud
    description: Absolutely deny exposing any Resource with has_secret:true to cloud-based LLMs.
    effect: deny
    match:
      action: [expose-to-llm]
    condition:
      all_of:
        - resource.attributes.has_secret: { eq: true }
        - subject.attributes.tier: { ni: [T1] }
    priority: 1000

  - id: permit-local-secret-processing
    description: Permit local SLM (T1) or human users to see secrets for local processing.
    effect: permit
    match:
      action: [read, recall, expose-to-llm]
    condition:
      all_of:
        - resource.attributes.has_secret: { eq: true }
        - any_of:
            - subject.attributes.tier: { eq: T1 }
            - subject.kind: { eq: user }
    priority: 950

  - id: force-step-up-for-vaulted
    description: Require PIN verification to modify atoms containing vaulted secrets.
    effect: deny
    match:
      action: [modify, delete]
    condition:
      all_of:
        - resource.attributes.encryption_level: { eq: vault }
        - subject.last_step_up_at: { not_exists: true }
    on_deny:
      obligation:
        kind: request-step-up-auth
        params:
          method: pin
    priority: 900
