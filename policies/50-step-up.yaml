id: pack-step-up-auth
description: Forces Step-up Auth (PIN) for sensitive actions (UCF Phase 5).
rules:
  - id: permit-recent-step-up
    description: Permit sensitive actions if step-up was performed within last 15 minutes.
    effect: permit
    match:
      action: [modify, delete]
    condition:
      # TTL: 900 seconds (15 mins)
      subject.last_step_up_at: { time_within: 900 }
    priority: 800

  - id: step-up-required-sensitive
    description: Issue step-up advice for sensitive actions if not recently verified.
    effect: deny
    match:
      action: [modify, delete]
    condition:
      # If we reach here, either last_step_up_at doesn't exist or is older than 15 mins.
      all_of:
        - subject.kind: { eq: user }
    on_deny:
      obligation:
        kind: request-step-up-auth
        params:
          method: pin
    priority: 700
