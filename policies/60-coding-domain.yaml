id: pack-coding-domain
description: Specific ABAC rules for Software Engineering (Coding) domain (FEAT--CODING-DOMAIN-PACK).
rules:
  - id: restrict-entrypoint-to-t3
    description: Only T3 agents or humans can modify system entrypoints.
    effect: deny
    match:
      action: [modify, delete]
    condition:
      all_of:
        - resource.attributes.is_entrypoint: { eq: true }
        - subject.attributes.tier: { ni: [T3] }
        - subject.kind: { ni: [user] }
    priority: 900

  - id: permit-test-for-t1
    description: Explicitly permit T1 agents to read/modify test files.
    effect: permit
    match:
      subject_kind: [subagent]
      action: [read, recall, modify, expose-to-llm]
    condition:
      all_of:
        - subject.attributes.tier: { eq: T1 }
        - resource.attributes.is_test: { eq: true }
    priority: 850

  - id: restrict-core-to-t2-plus
    description: Low-tier T1 agents should not modify core code (non-test, non-entrypoint).
    effect: deny
    match:
      subject_kind: [subagent]
      action: [modify, delete]
    condition:
      all_of:
        - subject.attributes.tier: { eq: T1 }
        - resource.attributes.is_test: { eq: false }
        - resource.attributes.is_entrypoint: { eq: false }
    priority: 800
