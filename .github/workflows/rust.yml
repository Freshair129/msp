name: rust

on:
  push:
    branches: [main]
    paths:
      - 'packages/gks/native/**'
      - '.github/workflows/rust.yml'
  pull_request:
    paths:
      - 'packages/gks/native/**'
      - '.github/workflows/rust.yml'

defaults:
  run:
    shell: bash

jobs:
  unit-test:
    # Pure-Rust unit tests — runs once on Linux; no Node needed.
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/gks/native/genesis-block
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: cargo fmt --check
        run: cargo fmt --check
      - name: cargo clippy
        run: cargo clippy -- -D warnings
      - name: cargo test
        run: cargo test

  build-and-load:
    # Build the .node for the host, load it from Node, run the sanity test.
    # P3.1 ships three hosts; linux-arm64 cross-compile lands in P3.5.
    needs: unit-test
    strategy:
      fail-fast: false
      matrix:
        include:
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            triple: linux-x64-gnu
          - host: macos-13
            # macos-13 is Intel hardware. macos-latest is now M-series (arm64);
            # building x64 there and then loading it on arm64 Node makes
            # napi-rs's runtime loader look for `genesis-block.darwin-arm64.node`
            # while the build only produced the `.darwin-x64.node` file.
            target: x86_64-apple-darwin
            triple: darwin-x64
          - host: macos-latest
            target: aarch64-apple-darwin
            triple: darwin-arm64
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            triple: win32-x64-msvc
    runs-on: ${{ matrix.host }}
    defaults:
      run:
        working-directory: packages/gks/native/genesis-block
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: install
        run: npm install --no-audit --no-fund
      - name: napi build (target ${{ matrix.target }})
        run: npx napi build --platform --release --target ${{ matrix.target }}
      - name: node --test (load + sanity)
        run: npm test
      - name: upload .node artifact
        uses: actions/upload-artifact@v4
        with:
          name: genesis-block-${{ matrix.triple }}
          path: packages/gks/native/genesis-block/*.node
          if-no-files-found: error
          retention-days: 7
