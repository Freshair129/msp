name: test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: install
        # npm bug: platform-specific optional deps (e.g. @rollup/rollup-linux-x64-gnu)
        # are NOT installed if the lockfile was generated on a different OS — even
        # with `npm install` (it still honors the existing lockfile structure).
        # Workaround per Rollup's error message: remove package-lock.json and reinstall.
        # https://github.com/npm/cli/issues/4828
        #
        # Same npm bug affects workspace bin-linking: `npm install` doesn't
        # always create node_modules/.bin/<name> symlinks for workspace
        # packages. `npm rebuild` does. Without this, `npx gks verify-flow`
        # in the verify-flow-per-FEAT step below can't resolve the binary.
        run: |
          rm -f package-lock.json
          npm install --no-audit --no-fund
          npm rebuild --workspace=@freshair129/gks

      - name: shellcheck packages/msp/examples/hooks/
        run: |
          # Ubuntu runners ship shellcheck.
          shellcheck packages/msp/examples/hooks/*.sh

      - name: build
        # Build must run BEFORE typecheck: MSP imports from `@freshair129/gks/memory`
        # which is exported via `dist/src/memory/index.d.ts` per packages/gks/package.json#exports.
        # On a fresh `npm ci` checkout there is no dist/ yet, so typecheck fails to resolve
        # GKS types unless we build first.
        #
        # Per-workspace invocation so a failure is attributed to the correct
        # workspace. `npm run build --workspaces` swallows the workspace name
        # in stack traces. Each workspace's output is also tee'd to a
        # per-workspace log file uploaded as an artifact on failure so the
        # full diagnostic (file:line + surrounding tsc output) is recoverable
        # even when GH Actions' annotation strips the source location.
        run: |
          set +e
          mkdir -p build-logs
          echo "::group::node + tsc versions"
          node --version | tee build-logs/_versions.log
          npx tsc --version | tee -a build-logs/_versions.log
          echo "::endgroup::"
          fail=0
          for ws in @freshair129/gks msp @freshair129/gks-cli @freshair129/gks-mcp @freshair129/gks-tui @freshair129/genesis-ui; do
            slug=$(echo "$ws" | tr '/@' '__')
            echo "::group::build $ws"
            npm run build --workspace="$ws" --if-present 2>&1 | tee "build-logs/${slug}.log"
            rc=${PIPESTATUS[0]}
            echo "::endgroup::"
            if [ "$rc" -ne 0 ]; then
              echo "::error title=build failed in $ws::see build-logs artifact (exit $rc)"
              echo "--- TAIL of $ws build log ---"
              tail -50 "build-logs/${slug}.log"
              echo "--- END TAIL ---"
              fail=1
            fi
          done
          exit $fail

      - name: upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-node${{ matrix.node-version }}
          path: build-logs/
          if-no-files-found: ignore

      - name: post build logs to PR on failure
        # Posts a comment containing the full build-logs/ contents so the
        # full tsc diagnostic is visible without artifact-download auth.
        # Only fires on a real PR (event_name) and only when the build step
        # actually failed (job.status == 'failure' implies a downstream step
        # set it; we use `steps.<id>.outcome` but we don't have ids — guard
        # by checking the logs dir exists with a non-empty per-workspace log).
        if: failure() && github.event_name == 'pull_request' && matrix.node-version == 20
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const dir = 'build-logs';
            if (!fs.existsSync(dir)) return;
            const files = fs.readdirSync(dir).filter(f => f.endsWith('.log'));
            const parts = [];
            parts.push(`<!-- ci-build-diag -->`);
            parts.push(`## CI build diagnostic (node ${process.env.NODE_VERSION || '20'})`);
            parts.push(`Triggered by failure on \`${context.sha}\`.`);
            parts.push('');
            for (const f of files) {
              const full = path.join(dir, f);
              const body = fs.readFileSync(full, 'utf8');
              // tail 80 lines so we stay under GH's comment size limit
              const tail = body.split('\n').slice(-80).join('\n');
              parts.push(`<details><summary><code>${f}</code> (last 80 lines)</summary>\n\n\`\`\`\n${tail}\n\`\`\`\n</details>`);
            }
            const body = parts.join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: typecheck
        run: npm run typecheck

      - name: msp:index
        # Must run BEFORE vitest: many tests (validator/cli, hooks, mcp tools) read
        # gks/00_index/atomic_index.jsonl at runtime via --root=packages/msp.
        # The .jsonl is gitignored — fresh CI checkout has no file until we generate it.
        run: npm run msp:index

      - name: vitest
        run: npm test

      - name: msp:validate (whole tree)
        # Use root-level script which invokes the validator at
        # packages/msp/src/validator/cli.ts with --root=. (= repo root).
        run: npm run msp:validate

      - name: msp:backlinks (rebuild + determinism check)
        run: |
          # The .jsonl is gitignored — fresh checkout has no file to compare against.
          # Build it once, then run --check to assert a second pass is no-op (deterministic).
          # --root=../.. so the workspace-scoped script scans the repo-root gks/ vault.
          npm run msp:backlinks --workspace=packages/msp -- --root=../..
          npm run msp:backlinks --workspace=packages/msp -- --root=../.. --check

      - name: msp:check-links (gks crosslink integrity)
        run: npm run msp:check-links

      - name: verify-flow per FEAT
        run: |
          set -e
          for feat_path in gks/feat/FEAT--*.md; do
            feat=$(basename "$feat_path" .md)
            # Skip FEATs whose status marks them as terminal or in-flight —
            # `superseded`/`deprecated` are terminal lifecycle states, `draft`
            # is pre-promotion, and `active` is the "shipped but not yet
            # blessed as stable" state (per phase-status validator rule;
            # active is below stable in STATUS_ORDER). verify-flow gates only
            # on stable chain heads. Their successors are walked via
            # crosslinks.superseded_by from whatever cites them.
            if grep -qE '^status: (draft|active|superseded|deprecated)$' "$feat_path"; then
              echo "→ $feat (skipped: $(grep -oE '^status: \w+' "$feat_path" | cut -d' ' -f2))"
              continue
            fi
            echo "→ $feat"
            npx gks verify-flow "$feat" --root=. --through-superseded
          done
