name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: install
        # npm bug: platform-specific optional deps (e.g. @rollup/rollup-linux-x64-gnu)
        # are NOT installed if the lockfile was generated on a different OS — even
        # with `npm install` (it still honors the existing lockfile structure).
        # Workaround per Rollup's error message: remove package-lock.json and reinstall.
        # https://github.com/npm/cli/issues/4828
        #
        # Same npm bug affects workspace bin-linking: `npm install` doesn't
        # always create node_modules/.bin/<name> symlinks for workspace
        # packages. `npm rebuild` does. Without this, `npx gks verify-flow`
        # in the verify-flow-per-FEAT step below can't resolve the binary.
        run: |
          rm -f package-lock.json
          npm install --no-audit --no-fund
          npm rebuild --workspace=@freshair129/gks

      - name: shellcheck packages/msp/examples/hooks/
        run: |
          # Ubuntu runners ship shellcheck.
          shellcheck packages/msp/examples/hooks/*.sh

      - name: build
        # Build must run BEFORE typecheck: MSP imports from `@freshair129/gks/memory`
        # which is exported via `dist/src/memory/index.d.ts` per packages/gks/package.json#exports.
        # On a fresh `npm ci` checkout there is no dist/ yet, so typecheck fails to resolve
        # GKS types unless we build first.
        run: npm run build

      - name: typecheck
        run: npm run typecheck

      - name: msp:index
        # Must run BEFORE vitest: many tests (validator/cli, hooks, mcp tools) read
        # gks/00_index/atomic_index.jsonl at runtime via --root=packages/msp.
        # The .jsonl is gitignored — fresh CI checkout has no file until we generate it.
        run: npm run msp:index

      - name: vitest
        run: npm test

      - name: msp:validate (whole tree)
        # Use root-level script which invokes the validator at
        # packages/msp/src/validator/cli.ts with --root=. (= repo root).
        run: npm run msp:validate

      - name: msp:backlinks (rebuild + determinism check)
        run: |
          # The .jsonl is gitignored — fresh checkout has no file to compare against.
          # Build it once, then run --check to assert a second pass is no-op (deterministic).
          # --root=../.. so the workspace-scoped script scans the repo-root gks/ vault.
          npm run msp:backlinks --workspace=packages/msp -- --root=../..
          npm run msp:backlinks --workspace=packages/msp -- --root=../.. --check

      - name: msp:check-links (gks crosslink integrity)
        run: npm run msp:check-links

      - name: verify-flow per FEAT
        run: |
          set -e
          for feat_path in gks/feat/FEAT--*.md; do
            feat=$(basename "$feat_path" .md)
            # Skip FEATs whose status marks them as terminal or in-flight —
            # `superseded`/`deprecated` are terminal lifecycle states, `draft`
            # is pre-promotion, and `active` is the "shipped but not yet
            # blessed as stable" state (per phase-status validator rule;
            # active is below stable in STATUS_ORDER). verify-flow gates only
            # on stable chain heads. Their successors are walked via
            # crosslinks.superseded_by from whatever cites them.
            if grep -qE '^status: (draft|active|superseded|deprecated)$' "$feat_path"; then
              echo "→ $feat (skipped: $(grep -oE '^status: \w+' "$feat_path" | cut -d' ' -f2))"
              continue
            fi
            echo "→ $feat"
            npx gks verify-flow "$feat" --root=. --through-superseded
          done
