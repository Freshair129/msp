  process_tracking:
    description: Non-atomic IDs (not in gks/)
    prefixes:
      MSP-SESS: Session ID
      MSP-IMP: Implementation Plan
      MSP-TSK: Task log
      MSP-ACT: Action log (per turn)
      MSP-WKT: Walkthrough (sign-off bundle)
      MSP-INC: Incident event (raw)
      MSP-REV: Review
      MSP-FBK: Feedback
      MSP-USR: User identity
      MSP-AGT: Agent identity
  decision_rule:
    existing_code:
      Decision: ADR
      Root policy: MASTER
      Validator rule: PROTO
      Feature spec: FEAT
      Algorithm: ALGO
      Architectural framework: FRAMEWORK
      Block manifest: GENESIS
      Tech stack: STACK
      Module: MOD
      Data schema: ENTITY
      Spec / contract: SPEC
      API contract: API / ENDPOINT / ENTRYPOINT
    what_to_build:
      Idea: IDEA
      Concept / PRD: CONCEPT
      Plan: BLUEPRINT
      Microtask: T*
      Test result: AUDIT
    requirements:
