schema_config:
  version: "2.5"
  last_updated: 2026-05-17T09:14:00+07:00
  schema_spec:
    compound_id_format: "{aliases}-{atomId}--{knowledgeId}--K{atomtype_counter}"
    atomId_format: "{atom_counter}"
    description: |
      Genesis Knowledge System (GKS) Compound Primary Identifier Schema. Each atom ID is composed of four parts:
        - aliases (or type prefix): E.g. CONCEPT (from aliases[0])
        - atomId (atom_counter): E.g. 371 (sequence number / SQL DB Primary Key)
        - knowledgeId: E.g. DATABASE-CHOICE (semantic slug / conceptual cluster)
        - atomtype_counter (phase layer): E.g. K2 (derived from phase + 1)
      Example generated ID: CONCEPT-371--DATABASE-CHOICE--K2
    fields:
      id:
        type: string
        description: Canonical compound identifier, E.g.
          CONCEPT-371--DATABASE-CHOICE--K2 or CONCEPT--DATABASE-CHOICE
      phase:
        type: integer
        description: Development phase (0 to 6)
      type:
        type: string
        description: Lowercase type prefix matching the folder name, E.g. concept, adr, feat
      status:
        type: string
        description: Lifecycle status, E.g. stable, draft, active, raw, stub,
          deprecated, superseded
      vault_id:
        type: string
        description: "Obsidian vault identifier, default value: default"
      tier:
        type: string
        description: Context governance tier, E.g. genesis, master, safety, process
      source_type:
        type: string
        description: Information origin classification, E.g. axiomatic, learned, episodic
      title:
        type: string
        description: Short human-readable title
      tags:
        type: array
        items: string
        description: Categorisation tags array
      crosslinks:
        type: object
        description: Semantic relations graph edges
        properties:
          references:
            type: array
            items: string
            description: Referenced sibling or external atom IDs
          implements:
            type: array
            items: string
            description: Specifications or blueprints implemented by this atom
          parent_blueprint:
            type: array
            items: string
            description: Blueprint driving the creation of this atom
          supersedes:
            type: array
            items: string
            description: Legacy atoms deprecated or replaced by this atom
      created_at:
        type: string
        format: date-time
        description: Creation timestamp in ISO-8601 with ICT/Thailand offset (+07:00)
      aliases:
        type: array
        items: string
        description: Obsidian aliases array, index 0 MUST be the UPPERCASE type prefix
      cluster:
        type: string
        description: Taxonomy grouping cluster, E.g. implementation_flow,
          agent_governance, requirements, ops, memory
      role:
        type: string
        description: Duties and responsibilities associated with the atom type
      attributes:
        type: object
        description: "Custom key-value metadata attributes, E.g. domain: adr"
  taxonomy:
    clusters:
      implementation_flow:
        description: Phase-aligned with the build pipeline (P0 → P6)
        types:
          IDEA:
            phase: 0
            role: Raw prompt / spark
            tier: process
            folder: idea
            sections:
              - Spark
              - Source
            lifecycle: Short-lived; promoted into CONCEPT-- within days.
          CONCEPT:
            phase: 1
            role: Strategic intent / PRD
            tier: process
            folder: concept
            sections:
              - Problem
              - Hypothesis
              - Scope
              - Out of scope
              - Verification
              - Source
            description: Human-readable requirement / vision.
          ADR:
            phase: 2
            role: Architecture decision record
            tier: process
            folder: adr
            sections:
              - Context
              - Decision
              - Consequences
              - Alternatives considered
              - Source
            description: Load-bearing technical or organisational decisions.
          MOD:
            phase: 2
            role: Module manifest
            tier: process
            folder: mod
            sections:
              - Module boundary
              - Public API
              - Dependencies
              - Source
            description: Declares a module's scope, public API, and ownership boundary.
          FEAT:
            phase: 2
            role: Feature spec
            tier: process
            folder: feat
            sections:
              - User-facing behaviour
              - Verification
              - Out of scope
              - Source
            description: User-facing system behaviour.
          ALGO:
            phase: 2
            role: Algorithm definition
            tier: process
            folder: algo
            sections:
              - Inputs
              - Algorithm
              - Complexity
              - Edge cases
              - Source
            description: Computational steps, scoring formulas, ranking logic.
          FLOW:
            phase: 2
            role: Data / UI flow
            tier: process
            folder: flow
            sections:
              - Flow Diagram
              - Sequence
              - Source
          ENTITY:
            phase: 2
            role: Data schema
            tier: process
            folder: entity
            sections:
              - Schema definition
              - Relations
              - Source
          API:
            phase: 2
            role: OpenAPI master hub
            tier: process
            folder: api
            sections:
              - API Overview
              - Base URL
              - Authentication
              - Source
          ENDPOINT:
            phase: 2
            role: One API path / method
            tier: process
            folder: endpoint
            sections:
              - Contract
              - Request
              - Response
              - Errors
              - Source
          ENTRYPOINT:
            phase: 2
            role: Auth / middleware / access logic
            tier: process
            folder: entrypoint
            sections:
              - Access Logic
              - Middleware
              - Source
          PARAMS:
            phase: 2
            role: Constants / business config
            tier: process
            folder: params
            sections:
              - Configuration
              - Thresholds
              - Source
          GENESIS:
            phase: 0
            role: Block Manifest (v2.3+)
            tier: master
            folder: genesis
            sections:
              - Manifest Members
              - DACI
              - Source
            description: Runtime entry-point of a Genesis Block.
          FRAMEWORK:
            phase: 0
            role: Governance / architectural framework
            tier: master
            folder: framework
            sections:
              - Pattern
              - When to apply
              - Governance
              - Source
            description: Architectural patterns, governance frameworks.
          STACK:
            phase: 2
            role: Technology stack inventory
            tier: process
            folder: stack
            sections:
              - Inventory
              - Versions
              - Rationale
              - Source
          SPEC:
            phase: 2
            role: Technical specification
            tier: process
            folder: spec
            sections:
              - Data Shape
              - Wire Format
              - Source
          COGNITIVE:
            phase: 1
            role: Mental model / interpretive lens
            tier: process
            folder: cognitive
            sections:
              - Mental Model
              - Interpretive Lens
              - When to apply
              - Source
          SAFETY:
            phase: 0
            role: Ethical safety / AI alignment
            tier: safety
            folder: safety
            sections:
              - Alignment Rule
              - Ethical Guardrail
              - Enforcement
              - Source
          MASTER:
            phase: 0
            role: Root-level policy / genesis rule
            tier: master
            folder: master
            sections:
              - Policy
              - Scope
              - Enforcement
              - Source
          PROTO:
            phase: 2
            role: Machine-enforced invariant
            tier: safety
            folder: proto
            sections:
              - Rule
              - Severity
              - Enforcement
              - Counter-example
              - Source
          BLUEPRINT:
            phase: 3
            role: Implementation plan
            tier: process
            folder: blueprint
            sections:
              - Geography
              - Acceptance
              - Dependencies
              - Tasks
              - Source
          AUDIT:
            phase: 6
            role: Test results / quality report
            tier: process
            folder: audit
            sections:
