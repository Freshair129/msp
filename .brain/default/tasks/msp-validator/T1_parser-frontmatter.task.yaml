prompt: |
  Implement src/validator/parse.ts and src/validator/types.ts.

  parse.ts exports:
    - parseFile(filepath): Promise<ParsedAtom>
        reads UTF-8, splits on the first frontmatter delimiter `---\n`,
        parses YAML between delimiters, returns { fm, body, source, filepath }
    - extractWikilinks(body): Wikilink[]
        scans body for `[[ID]]` patterns, returns { id, line, column }[]
        MUST skip content inside fenced code blocks (between ``` lines)

  types.ts exports:
    - ParsedAtom { fm: Record<string, unknown>; body: string; source: string; filepath: string }
    - Wikilink { id: string; line: number; column: number }
    - ValidationError { rule: string; severity: 'error' | 'warning'; line?: number; column?: number; message: string; offending?: string }
    - ValidationContext { atomicIndex: Map<string, AtomicIndexEntry>; forbiddenFields?: ReadonlySet<string>; now?: Date }
    - ValidationResult { filepath: string; errors: ValidationError[]; warnings: ValidationError[] }
    - AtomicIndexEntry { id: string; type: string; status: string; path: string; crosslinks?: Record<string, string[]> }

  Use the `yaml` package (already in deps).
acceptance:
  - parseFile() correctly extracts frontmatter object and body string from a fixture with `---\nkey: value\n---\n# Body`
  - parseFile() throws a typed error if frontmatter delimiter is missing
  - extractWikilinks() finds `[[FEAT--FOO]]` at the correct line/column
  - extractWikilinks() does NOT flag `[[FEAT--BAR]]` inside a ```ts fenced block
  - vitest test under test/validator/parse.test.ts covers all four cases above
geography:
  - "src/validator/parse.ts"
  - "src/validator/types.ts"
  - "test/validator/parse.test.ts"
