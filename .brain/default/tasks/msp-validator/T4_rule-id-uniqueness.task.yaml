# Microtask (execution state — owned by orchestrator per ADR-015)

id: RULE-ID-UNIQUENESS
parent_blueprint: BLUEPRINT--MSP-VALIDATOR
status: open
assignee:
created_at: 2026-05-03T06:20:11.154Z
prompt: |
  Implement three rules:
    src/validator/rules/id-format.ts
    src/validator/rules/id-filename-match.ts
    src/validator/rules/adr-monotonic.ts

  id-format:
    Export idFormat(atom, ctx): ValidationError[]
    Regex: ID_PATTERN = /^(ADR-\d{3}|(ADR|FEAT|MOD|PROTO|FLOW|CONCEPT|BLUEPRINT|TASK|FRAME|AUDIT)--[a-z0-9-]+|HOTFIX--[a-z0-9]+)$/
    Reject if atom.fm.id (or atom.fm.proposed_id for inbound) doesn't match.

  id-filename-match:
    Export idFilenameMatch(atom, ctx): ValidationError[]
    Compare basename(atom.filepath) without extension against fm.id || fm.proposed_id.
    For inbound files, the filename has a `.rev-XXXX` suffix; strip it before comparing.
    Example: 'CONCEPT--MSP-VALIDATOR.rev-mopdsmj0-0042e668.md' → id should be 'CONCEPT--MSP-VALIDATOR'.

  adr-monotonic:
    Export adrMonotonic(atom, ctx): ValidationError[]
    Only applies when fm.type === 'adr' AND id matches /^ADR-\d{3}$/ (numeric form).
    Skip for ADR--SLUG (slug form is fine, no monotonic constraint).
    Compute max ADR-NNN number from ctx.atomicIndex; new id must equal max + 1.
    Reject otherwise with a message including the expected number.

  All three return ValidationError[] with appropriate rule names.
acceptance:
  - id-format rejects 'foo-bar' but accepts 'CONCEPT--MSP-VALIDATOR' and 'ADR-007'
  - id-filename-match rejects when CONCEPT--FOO is named CONCEPT--BAR.rev-X.md
  - id-filename-match correctly strips the `.rev-XXXX` suffix from inbound filenames
  - adr-monotonic returns empty when ADR-001..ADR-005 in index and new id is ADR-006
  - adr-monotonic rejects when ADR-001..ADR-005 in index and new id is ADR-008
  - adr-monotonic skips slug-form ADR--FOO (no error)
  - vitest tests for each rule under test/validator/rules/
geography:
  - "src/validator/rules/id-format.ts"
  - "src/validator/rules/id-filename-match.ts"
  - "src/validator/rules/adr-monotonic.ts"
  - "test/validator/rules/id-format.test.ts"
  - "test/validator/rules/id-filename-match.test.ts"
  - "test/validator/rules/adr-monotonic.test.ts"
