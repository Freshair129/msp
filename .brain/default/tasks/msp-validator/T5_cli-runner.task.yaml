prompt: |
  Implement src/validator/index.ts (TS API), src/validator/atomic-index.ts
  (loader), and src/validator/cli.ts (bin entry).

  src/validator/atomic-index.ts:
    - export async function loadAtomicIndex(path: string): Promise<Map<string, AtomicIndexEntry>>
    - reads JSONL line-by-line; throws typed ValidatorIOError if file missing
    - skips empty lines; throws on malformed JSON

  src/validator/index.ts:
    - export async function validate(filepath, ctx): Promise<ValidationResult>
    - composes HARD_RULES = [forbiddenFields, idFormat, idFilenameMatch,
      danglingWikilinks, adrMonotonic] (extend later)
    - runs them sequentially, collects errors and warnings, returns ValidationResult
    - export async function validateAll(rootDirs: string[], ctx): Promise<ValidationResult[]>
    - walks every .md file under given dirs

  src/validator/cli.ts:
    - parses args: <file>... or --all
    - loads atomic index from gks/00_index/atomic_index.jsonl by default
      (overridable via --index=<path>)
    - calls validate or validateAll
    - prints results in two formats: pretty (default) or --json
    - exit codes: 0 pass, 1 hard violations, 2 internal error
    - shebang `#!/usr/bin/env node`, runs under tsx via npm script

  Wire `bin: { msp-validate: "./src/validator/cli.ts" }` in package.json
  (running through tsx via `npm run msp:validate`).
acceptance:
  - `npm run msp:validate -- test/fixtures/valid-atom.md` → exit 0, prints `✓ <file>`
  - `npm run msp:validate -- test/fixtures/forbidden-field-atom.md` → exit 1, prints `✗ ... [forbidden-fields]`
  - `npm run msp:validate -- --all` → walks gks/ + .brain/.../inbound/, prints summary
  - `npm run msp:validate -- --json test/fixtures/forbidden-field-atom.md` → emits valid JSON with errors[].rule
  - missing atomic index → exit 2 with helpful message including `npm run msp:index`
  - vitest test under test/validator/cli.test.ts spawns the CLI and asserts exit codes + stdout
  - `npm run msp:validate -- --all` after M1 promotion succeeds (dogfood — exit 0)
