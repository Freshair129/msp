# MSP atomic write contract — runtime-loadable schema for validator rules.
#
# Loaded by `src/validator/contract.ts`. If this file is missing or invalid,
# the validator falls back to its hardcoded defaults (defined inline in each
# rule module) and prints a warning.
#
# Editing this file does NOT require a code release. Edits should still go
# through code review since they widen or narrow the validator's contract.
#
# Source: msp_spec.md §4. Authority: ADR--FORBIDDEN-FIELDS-LIST,
# ADR--ANTI-HALLUCINATION-RULES.

version: 1

# 17 fields agents must never set in frontmatter. Validator's
# forbidden-fields rule enforces; promote workflow strips on its way to gks/.
forbidden_fields:
  # Identity forgery (5)
  - commit_hash
  - merge_commit
  - tenant_id
  - pr_number
  - reviewer_approved_at

  # Authority — MSP only (5)
  - promotion_level
  - validated_at
  - validated_by
  - msp_signature
  - hash

  # Runtime metrics (4)
  - execution_count
  - last_error
  - uptime
  - latency_p50

  # Fabrication risk (3)
  - adr_number_override
  - feature_id_override
  - incident_id

# Required frontmatter fields per atom type. Validator's required-fields
# rule looks up `by_type[<type>]` first, falling back to `default`.
# Missing or empty values fail with [required-fields].
#
# Conservative defaults: only fields that EVERY existing atom in this repo
# already has. Per-type lists add atom-specific requirements.
required_fields:
  default:
    - id
    - phase
    - type
    - status
    - title
    - created_at
    - aliases
    - cluster
    - role
  by_type:
    adr:
      - id
      - phase
      - type
      - status
      - title
      - created_at
      - tags
      - aliases
      - cluster
      - role
    feat:
      - id
      - phase
      - type
      - status
      - title
      - created_at
      - aliases
      - cluster
      - role
    blueprint:
      - id
      - phase
      - type
      - status
      - title
      - created_at
      - linked_symbols
      - aliases
      - cluster
      - role
    audit:
      - id
      - phase
      - type
      - status
      - title
      - created_at
      - aliases
      - cluster
      - role
    episode:
      - id
      - phase
      - type
      - status
      - title
      - created_at
      - aliases
      - cluster
      - role
    usage:
      - id
      - phase
      - type
      - status
      - title
      - created_at
      - tags
      - aliases
      - cluster
      - role

# Reserved for M6: per-field constraints (length, regex, type).
# Currently the loader ignores this section; summary length/placeholder
# checks live in src/validator/rules/summary-min.ts.
field_constraints: {}
