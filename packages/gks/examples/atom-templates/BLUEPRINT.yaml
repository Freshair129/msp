  tier: process
  created_at: 2026-05-13T12:00:00.000+07:00
  name: <human-readable>
  module: <MOD-- this builds inside>
  status: draft                 # draft | approved | implemented
  version: 0.1.0
  author: <MSP-USR-… or MSP-AGT-…>
  crosslinks:
    references: []              # ADR-- / FEAT-- background context (Context Link)
    governed_by: []             # ADR-- architecture rules (Governance Link)
    part_of: []                 # MOD-- module manifest (Hierarchical Link)

architectural_pattern:
  pattern: repository|service|controller|adapter|...
  layering: src/<framework-path>

data_logic:
  inputs: []
  outputs: []
  transformations: []

geography:                      # 1:1 with src/ paths produced
  components: []                # files this blueprint generates
  repositories: []              # repository-pattern entry points
  routes: []                    # route handlers (for web frameworks)

api_contracts: []               # endpoint + request + response schema
