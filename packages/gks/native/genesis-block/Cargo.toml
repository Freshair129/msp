[package]
name = "genesis-block-native"
version = "0.0.1"
edition = "2021"
description = "Genesis Block — embedded graph engine for GKS (Phase 3.1 scaffold)"
license = "MIT"
publish = false

[lib]
# rlib alongside cdylib so `cargo test` can link the in-file unit tests.
# The cdylib is what napi-rs consumes for the .node artifact.
crate-type = ["cdylib", "rlib"]

[dependencies]
napi = { version = "2.16", default-features = false, features = ["napi8", "async", "serde-json"] }
napi-derive = "2.16"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["full"] }
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1.0", features = ["v4", "serde"] }
parking_lot = "0.12"
sha2 = "0.10"
hex = "0.4"

[build-dependencies]
napi-build = "2.1"

[dev-dependencies]
tempfile = "3.3"

[profile.release]
lto = true
codegen-units = 1
strip = "symbols"
