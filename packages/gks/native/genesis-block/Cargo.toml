[package]
name = "genesis-block-native"
version = "0.0.1"
edition = "2021"
description = "Genesis Block — embedded graph engine for GKS (Phase 3.2-3.4)"
license = "MIT"
publish = false

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
napi = { version = "2.16", default-features = false, features = ["napi8", "async", "serde-json"] }
napi-derive = "2.16"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1.0", features = ["v4", "serde"] }
tokio = { version = "1", features = ["full"] }
md5 = "0.7"
regex = "1"
dashmap = "6.0"
once_cell = "1.19"
parking_lot = "0.12"

[build-dependencies]
napi-build = "2.1"

[profile.release]
lto = true
codegen-units = 1
strip = "symbols"
